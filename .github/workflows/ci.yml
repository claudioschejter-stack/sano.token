name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Contract tests
        run: npm run contracts:test

      - name: Build API
        run: npm run build -w @sanova/api

      - name: Build Web
        run: npm run build -w @sanova/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install Slither
        run: python -m pip install --upgrade pip slither-analyzer

      - name: Run RWA contract security audit
        run: npm run contracts:security-audit
        env:
          REQUIRE_SLITHER: 'true'
