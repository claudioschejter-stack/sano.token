name: Watch crypto deposits (backup)

# Vercel Hobby plan only allows one cron invocation per day, but the crypto
# deposit backup scan (client-side polling is the primary detection path) is
# more useful running every few minutes. This workflow pings the same
# endpoint on a tighter schedule using a separate secret so it doesn't touch
# the native Vercel cron's CRON_SECRET.
#
# NOTE: this hits the *.vercel.app production alias, not the custom domain
# (www.sanovacapital.com). The custom domain is proxied through Cloudflare,
# which issues a JS "managed challenge" to GitHub Actions runner IPs before
# the request ever reaches our app -- curl can't solve that challenge, so it
# always came back as an opaque 403 regardless of the bearer token. The
# *.vercel.app alias resolves straight to the deployment and isn't proxied
# by Cloudflare, so the app's own auth check (401/200) is what decides.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger watch-crypto-deposits endpoint
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_EXTERNAL_SECRET }}" \
            "https://sano-token-web.vercel.app/api/cron/watch-crypto-deposits"
