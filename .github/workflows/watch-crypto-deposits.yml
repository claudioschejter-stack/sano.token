name: Watch crypto deposits (backup)

# Vercel Hobby plan only allows one cron invocation per day, but the crypto
# deposit backup scan (client-side polling is the primary detection path) is
# more useful running every few minutes. This workflow pings the same
# endpoint on a tighter schedule using a separate secret so it doesn't touch
# the native Vercel cron's CRON_SECRET.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger watch-crypto-deposits endpoint
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_EXTERNAL_SECRET }}" \
            "https://www.sanovacapital.com/api/cron/watch-crypto-deposits"
