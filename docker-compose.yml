services:
  postgres:
    image: postgres:15-alpine
    container_name: sanova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sanova_rwa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sanova_rwa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sanova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sanova-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sanova_rwa?schema=public
      FRONTEND_ORIGINS: http://localhost:3000,https://sano-token-web.vercel.app
      REDIS_URL: redis://redis:6379
      BLOCKCHAIN_LISTENER_ENABLED: "true"
      BLOCKCHAIN_WRITES_ENABLED: "true"
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-https://mainnet.base.org}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-at-least-32-characters-long}
      AUTH_INTERNAL_SECRET: ${AUTH_INTERNAL_SECRET:-change-me-internal-secret-at-least-32-chars}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: sanova-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1

volumes:
  postgres_data:
